<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>StarWalk Lite</title>
  <style>
    :root {
      --bg: #02040a;
      --panel: rgba(7, 12, 24, 0.82);
      --panel-2: rgba(14, 20, 34, 0.88);
      --line: rgba(148, 168, 255, 0.18);
      --text: #e8efff;
      --muted: #9cb0d8;
      --accent: #7cb7ff;
      --danger: #ff7d7d;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 120%, rgba(34,55,91,0.35), transparent 42%),
        radial-gradient(circle at 50% -10%, rgba(67,91,145,0.07), transparent 35%),
        linear-gradient(180deg, #03050d 0%, #010207 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #app { position: relative; width: 100%; height: 100%; }
    #scene { position: absolute; inset: 0; }
    #labels { position: absolute; inset: 0; pointer-events: none; }
    .label {
      position: absolute;
      transform: translate(-50%, -50%);
      color: #dfe8ff;
      font-size: 11px;
      letter-spacing: 0.02em;
      text-shadow: 0 0 10px rgba(0,0,0,0.95), 0 0 3px rgba(0,0,0,0.95);
      white-space: nowrap;
      opacity: 0.94;
    }
    .label.object { font-weight: 600; }
    .label.star { color: #b9c8ea; opacity: 0.78; }
    .label.constellation { color: #7f98c9; opacity: 0.55; text-transform: uppercase; font-size: 10px; letter-spacing: 0.12em; }
    .hud {
      position: absolute;
      z-index: 10;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 16px 48px rgba(0,0,0,0.35);
    }
    #topBar {
      top: 14px; left: 14px; right: 14px;
      display: flex; gap: 12px; justify-content: space-between; align-items: flex-start;
      padding: 12px 14px;
      background: linear-gradient(180deg, rgba(9,15,31,0.92), rgba(7,11,21,0.72));
      border-radius: 16px;
    }
    .stack { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
    .tiny { color: var(--muted); font-size: 11px; }
    .main { font-size: 14px; font-weight: 600; }
    .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    button, input, select {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      font: inherit;
    }
    button {
      cursor: pointer;
      transition: background 0.15s ease, transform 0.15s ease;
      min-width: 36px;
    }
    button:hover { background: rgba(124,183,255,0.14); }
    button.active { background: rgba(124,183,255,0.2); border-color: rgba(124,183,255,0.35); }
    input[type="range"] { padding: 0; width: 180px; }
    #infoCard {
      right: 14px; bottom: 14px; width: min(320px, calc(100vw - 28px));
      background: linear-gradient(180deg, rgba(12,16,31,0.93), rgba(7,10,19,0.78));
      border-radius: 18px;
      padding: 14px 16px;
    }
    #infoCard.hidden { display: none; }
    #infoTitle { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    #infoType { color: var(--accent); font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
    .metric { display: grid; grid-template-columns: 96px 1fr; gap: 6px; font-size: 13px; padding: 3px 0; }
    .metric div:first-child { color: var(--muted); }
    #locationPanel {
      left: 14px; bottom: 14px; width: min(380px, calc(100vw - 28px));
      padding: 12px 14px;
      background: linear-gradient(180deg, rgba(12,17,31,0.88), rgba(7,10,19,0.72));
      border-radius: 16px;
    }
    #locationForm { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-top: 8px; }
    #locationForm input { width: 100%; }
    #compass {
      position: absolute; left: 50%; bottom: 92px; transform: translateX(-50%);
      display: flex; gap: min(18vw, 86px); z-index: 8; pointer-events: none;
      color: rgba(221,232,255,0.72); font-size: 12px; letter-spacing: 0.18em;
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
    }
    #message {
      position: absolute; top: 92px; left: 50%; transform: translateX(-50%);
      z-index: 12; background: rgba(10,15,25,0.82); border: 1px solid rgba(255,255,255,0.08);
      padding: 9px 12px; border-radius: 999px; font-size: 12px; color: var(--muted);
      backdrop-filter: blur(10px); display: none;
    }
    #reticle {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 28px; height: 28px; border: 1px solid rgba(255,255,255,0.16); border-radius: 50%;
      box-shadow: 0 0 0 1px rgba(124,183,255,0.08), inset 0 0 20px rgba(124,183,255,0.04);
      pointer-events: none; z-index: 3;
    }
    #reticle::before, #reticle::after {
      content: ""; position: absolute; background: rgba(255,255,255,0.25);
    }
    #reticle::before { left: 50%; top: -6px; width: 1px; height: 40px; transform: translateX(-50%); }
    #reticle::after { top: 50%; left: -6px; width: 40px; height: 1px; transform: translateY(-50%); }
    @media (max-width: 880px) {
      #topBar { flex-direction: column; align-items: stretch; }
      #locationForm { grid-template-columns: 1fr 1fr; }
      #locationForm button { grid-column: span 2; }
      input[type="range"] { width: 120px; }
    }
    @media (max-width: 640px) {
      #compass { bottom: 140px; gap: 16vw; }
      .label { font-size: 10px; }
      #topBar, #locationPanel, #infoCard { border-radius: 14px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>
    <div id="labels"></div>
    <div id="reticle"></div>
    <div id="message"></div>
    <div id="compass"><span>N</span><span>E</span><span>S</span><span>W</span></div>

    <div id="topBar" class="hud">
      <div class="stack">
        <div class="tiny">Observer</div>
        <div id="observerText" class="main">Locating…</div>
        <div id="timeText" class="tiny">—</div>
      </div>
      <div class="stack" style="align-items:flex-end;">
        <div class="row">
          <button id="backwardBtn" title="Reverse time">⏪</button>
          <button id="playBtn" class="active" title="Play/Pause">▶</button>
          <button id="forwardBtn" title="Forward time">⏩</button>
          <input id="speedRange" type="range" min="-1440" max="1440" step="5" value="60" />
          <span id="speedText" class="tiny">+60×</span>
        </div>
        <div class="row">
          <button id="nowBtn" title="Jump to now">Now</button>
          <button id="gyroBtn" title="Enable gyroscope">Gyro</button>
          <button id="pathsBtn" class="active" title="Toggle 24h orbital paths">Paths</button>
        </div>
      </div>
    </div>

    <div id="locationPanel" class="hud">
      <div class="tiny">Location override</div>
      <div id="locationStatus" class="main">Auto geolocation</div>
      <form id="locationForm">
        <input id="latInput" type="number" step="0.0001" min="-90" max="90" placeholder="Latitude" />
        <input id="lonInput" type="number" step="0.0001" min="-180" max="180" placeholder="Longitude" />
        <button type="submit">Apply</button>
      </form>
    </div>

    <div id="infoCard" class="hud hidden">
      <div id="infoTitle">—</div>
      <div id="infoType">Object</div>
      <div id="infoBody"></div>
    </div>
  </div>

      const T = (jd - 2451545.0) / 36525.0;
      const zeta = ((2306.2181*T + 0.30188*T*T + 0.017998*T*T*T)/3600) * DEG;
      const z = ((2306.2181*T + 1.09468*T*T + 0.018203*T*T*T)/3600) * DEG;
      const theta = ((2004.3109*T - 0.42665*T*T - 0.041833*T*T*T)/3600) * DEG;
      let a = raHours * 15 * DEG;
      let d = decDeg * DEG;
      const A = Math.cos(d) * Math.sin(a + zeta);
      const B = Math.cos(theta) * Math.cos(d) * Math.cos(a + zeta) - Math.sin(theta) * Math.sin(d);
      const C = Math.sin(theta) * Math.cos(d) * Math.cos(a + zeta) + Math.cos(theta) * Math.sin(d);
      let ra = Math.atan2(A, B) + z;
      let dec = Math.asin(C);

      const L = (280.4665 + 36000.7698*T) * DEG;
      const Lm = (218.3165 + 481267.8813*T) * DEG;
      const omega = (125.04452 - 1934.136261*T) * DEG;
      const dPsi = (-17.2*Math.sin(omega) - 1.32*Math.sin(2*L) - 0.23*Math.sin(2*Lm) + 0.21*Math.sin(2*omega)) / 3600 * DEG;
      const dEps = (9.2*Math.cos(omega) + 0.57*Math.cos(2*L) + 0.10*Math.cos(2*Lm) - 0.09*Math.cos(2*omega)) / 3600 * DEG;
      const eps0 = (23 + 26/60 + 21.448/3600 - (46.8150*T + 0.00059*T*T - 0.001813*T*T*T)/3600) * DEG;
      const eps = eps0 + dEps;
      ra += (Math.cos(eps0) + Math.sin(eps0) * Math.sin(ra) * Math.tan(dec)) * dPsi - Math.cos(ra) * Math.tan(dec) * dEps;
      dec += Math.sin(eps0) * Math.cos(ra) * dPsi + Math.sin(ra) * dEps;
      return { raHours: wrapAngle(ra * RAD) / 15, decDeg: dec * RAD };
    }

    function equatorialToHorizontal(raHours, decDeg, date, latDeg, lonDeg) {
      const H = (localSiderealDegrees(date, lonDeg) - raHours * 15) * DEG;
      const dec = decDeg * DEG;
      const lat = latDeg * DEG;
      const sinAlt = Math.sin(dec) * Math.sin(lat) + Math.cos(dec) * Math.cos(lat) * Math.cos(H);
      const alt = Math.asin(clamp(sinAlt, -1, 1));
      const y = -Math.sin(H);
      const x = Math.tan(dec) * Math.cos(lat) - Math.sin(lat) * Math.cos(H);
      const az = Math.atan2(y, x);
      return { altDeg: alt * RAD, azDeg: wrapAngle(az * RAD) };
    }

    function horizontalToVector(altDeg, azDeg, radius = SKY_RADIUS) {
      const alt = altDeg * DEG;
      const az = azDeg * DEG;
      const cosAlt = Math.cos(alt);
      return new THREE.Vector3(
        Math.sin(az) * cosAlt * radius,
        Math.sin(alt) * radius,
        -Math.cos(az) * cosAlt * radius
      );
    }

    function getBodyData(name, date) {
      const equ = Astronomy.Equator(name, date, observer, true, true);
      const hor = equatorialToHorizontal(equ.ra, equ.dec, date, observer.latitude, observer.longitude);
      const vec = horizontalToVector(hor.altDeg, hor.azDeg);
      const illum = name === 'Moon' ? Astronomy.Illumination('Moon', date) : null;
      const elon = (name !== 'Sun') ? Astronomy.Elongation(name, date) : null;
      return {
        name,
        type: name === 'Sun' || name === 'Moon' ? name : 'Planet',
        ra: equ.ra,
        dec: equ.dec,
        alt: hor.altDeg,
        az: hor.azDeg,
        vec,
        distanceAu: equ.dist,
        phase: illum ? illum.phase_fraction * 100 : null,
        magnitude: illum?.mag ?? null,
        elongation: elon?.elongation ?? null
      };
    }

    function moonPhaseName(phasePct) {
      const p = phasePct / 100;
      if (p < 0.03) return 'New Moon';
      if (p < 0.22) return 'Waxing Crescent';
      if (p < 0.28) return 'First Quarter';
      if (p < 0.47) return 'Waxing Gibbous';
      if (p < 0.53) return 'Full Moon';
      if (p < 0.72) return 'Waning Gibbous';
      if (p < 0.78) return 'Last Quarter';
      return 'Waning Crescent';
    }

    function createCircleSprite(color, size = 64) {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
      grad.addColorStop(0, 'rgba(255,255,255,1)');
      grad.addColorStop(0.35, color);
      grad.addColorStop(0.7, color.replace(')', ',0.2)').replace('rgb', 'rgba'));
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,size,size);
      return new THREE.CanvasTexture(c);
    }

    const starGeometry = new THREE.SphereGeometry(1, 10, 10);
    const starsByName = new Map(STARS.map(s => [s.name, s]));

    STARS.forEach(star => {
      const size = STAR_BASE_SIZE + Math.max(0.04, (2.2 - Math.min(star.mag, 2.2)) * 0.22);
      const mesh = new THREE.Mesh(
        starGeometry,
        new THREE.MeshBasicMaterial({ color: spectralHex(star.spec), transparent: true, opacity: 0.95 })
      );
      mesh.scale.setScalar(size);
      mesh.userData = { kind: 'star', data: star };
      star.mesh = mesh;
      starGroup.add(mesh);

      if (star.mag <= 1.8 || ['Polaris','Betelgeuse','Sirius','Vega','Arcturus'].includes(star.name)) {
        const label = document.createElement('div');
        label.className = 'label star';
        label.textContent = star.name;
        labelsRoot.appendChild(label);
        labelAnchors.push({ element: label, target: mesh, minDot: 0.1 });
      }
    });

    const bodyMeshes = new Map();
    BODY_LIST.forEach(name => {
      const color = BODY_COLORS[name];
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(name === 'Sun' ? 1.6 : name === 'Moon' ? 1.2 : 0.95, 18, 18),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.96 })
      );
      mesh.userData = { kind: 'body', name };
      const glow = new THREE.Sprite(new THREE.SpriteMaterial({ map: createCircleSprite(`rgb(${new THREE.Color(color).toArray().map(v => Math.round(v*255)).join(',')})`), transparent: true, opacity: name === 'Sun' ? 0.85 : 0.35 }));
      glow.scale.setScalar(name === 'Sun' ? 9 : 5.5);
      mesh.add(glow);
      objectGroup.add(mesh);
      bodyMeshes.set(name, mesh);

      const label = document.createElement('div');
      label.className = 'label object';
      label.textContent = name;
      labelsRoot.appendChild(label);
      labelAnchors.push({ element: label, target: mesh, minDot: 0.0 });
    });

    CONSTELLATIONS.forEach(constellation => {
      constellation.lines.forEach(([aName, bName]) => {
        const a = starsByName.get(aName); const b = starsByName.get(bName);
        if (!a || !b) return;
        const geom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const line = new THREE.Line(geom, new THREE.LineBasicMaterial({ color: 0x5d75a8, transparent: true, opacity: 0.32 }));
        line.userData = { a, b };
        lineGroup.add(line);
      });

      const usable = constellation.stars.map(n => starsByName.get(n)).filter(Boolean);
      if (!usable.length) return;
      const label = document.createElement('div');
      label.className = 'label constellation';
      label.textContent = constellation.name;
      labelsRoot.appendChild(label);
      const anchor = new THREE.Object3D();
      lineGroup.add(anchor);
      constellation.anchor = anchor;
      labelAnchors.push({ element: label, target: anchor, minDot: -0.1 });
    });

    function buildDashedLine(points, color) {
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineDashedMaterial({ color, transparent: true, opacity: 0.5, dashSize: 1.2, gapSize: 0.9 });
      const line = new THREE.Line(geometry, material);
      line.computeLineDistances();
      return line;
    }

    function refreshPaths() {
      const dayKey = `${observer.latitude.toFixed(2)}|${observer.longitude.toFixed(2)}|${state.simTime.toISOString().slice(0,10)}`;
      if (dayKey === state.lastPathKey && pathGroup.children.length) return;
      state.lastPathKey = dayKey;
      while (pathGroup.children.length) pathGroup.remove(pathGroup.children[0]);

      const start = new Date(state.simTime);
      start.setHours(0,0,0,0);
      const sampleHours = 96;
      BODY_LIST.forEach(name => {
        const pts = [];
        for (let i = 0; i <= sampleHours; i++) {
          const t = new Date(start.getTime() + i * 24 * 3600000 / sampleHours);
          const body = getBodyData(name, t);
          pts.push(horizontalToVector(body.alt, body.az, SKY_RADIUS * 0.995));
        }
        const line = buildDashedLine(pts, BODY_COLORS[name]);
        line.visible = state.showPaths;
        line.userData = { name, kind: 'path' };
        pathGroup.add(line);
      });
    }

    function updateStars() {
      STARS.forEach(star => {
        const ofDate = precessAndNutation(star.ra, star.dec, state.simTime);
        const hor = equatorialToHorizontal(ofDate.raHours, ofDate.decDeg, state.simTime, observer.latitude, observer.longitude);
        const pos = horizontalToVector(hor.altDeg, hor.azDeg);
        star.mesh.position.copy(pos);
        star.current = { ...hor, ra: ofDate.raHours, dec: ofDate.decDeg };
        const altFactor = clamp((hor.altDeg + 5) / 95, 0.08, 1);
        const base = STAR_BASE_SIZE + Math.max(0.04, (2.3 - Math.min(star.mag, 2.3)) * 0.22);
        star.mesh.scale.setScalar(base * altFactor);
        star.mesh.material.opacity = clamp(altFactor * 1.05, 0.12, 0.98);
      });

      lineGroup.children.forEach(obj => {
        if (obj.type === 'Line' && obj.userData.a) {
          const arr = obj.geometry.attributes.position.array;
          const a = obj.userData.a.mesh.position;
          const b = obj.userData.b.mesh.position;
          arr[0] = a.x; arr[1] = a.y; arr[2] = a.z;
          arr[3] = b.x; arr[4] = b.y; arr[5] = b.z;
          obj.geometry.attributes.position.needsUpdate = true;
        }
      });

      CONSTELLATIONS.forEach(c => {
        if (!c.anchor) return;
        const pts = c.stars.map(n => starsByName.get(n)?.mesh.position).filter(Boolean);
        if (!pts.length) return;
        const centroid = pts.reduce((acc, p) => acc.add(p.clone()), new THREE.Vector3()).multiplyScalar(1 / pts.length);
        c.anchor.position.copy(centroid);
      });
    }

    function updateBodies() {
      BODY_LIST.forEach(name => {
        const body = getBodyData(name, state.simTime);
        const mesh = bodyMeshes.get(name);
        mesh.position.copy(body.vec);
        mesh.scale.setScalar(name === 'Sun' ? 1.45 : name === 'Moon' ? 1.12 : 0.92 + (name === 'Jupiter' ? 0.16 : 0));
        mesh.material.opacity = clamp((body.alt + 6) / 90, 0.22, 1);
        mesh.userData.data = body;
      });
    }

    function updateLabels() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      labelAnchors.forEach(anchor => {
        const pos = anchor.target.getWorldPosition(new THREE.Vector3()).project(camera);
        const visible = pos.z < 1 && pos.z > -1 && pos.x >= -1.2 && pos.x <= 1.2 && pos.y >= -1.2 && pos.y <= 1.2;
        if (!visible) { anchor.element.style.display = 'none'; return; }
        const world = anchor.target.getWorldPosition(new THREE.Vector3()).normalize();
        const dot = world.dot(camera.getWorldDirection(new THREE.Vector3()));
        if (dot < anchor.minDot) { anchor.element.style.display = 'none'; return; }
        anchor.element.style.display = 'block';
        anchor.element.style.left = `${(pos.x * 0.5 + 0.5) * width}px`;
        anchor.element.style.top = `${(-pos.y * 0.5 + 0.5) * height}px`;
      });
    }

    function updateHUD() {
      observerText.textContent = `${observer.latitude.toFixed(3)}°, ${observer.longitude.toFixed(3)}°`;
      timeText.textContent = `${state.simTime.toLocaleString([], { dateStyle: 'medium', timeStyle: 'medium' })} · LST ${ (localSiderealDegrees(state.simTime, observer.longitude)/15).toFixed(2)}h`;
      speedText.textContent = `${state.speed >= 0 ? '+' : ''}${state.speed}×`;
      playBtn.textContent = state.isPlaying ? '⏸' : '▶';
      playBtn.classList.toggle('active', state.isPlaying);
      gyroBtn.classList.toggle('active', state.gyro);
      pathsBtn.classList.toggle('active', state.showPaths);
      locationStatus.textContent = state.gyro ? 'Gyroscope active' : 'Auto geolocation';
    }

    function renderInfo(target) {
      if (!target) { infoCard.classList.add('hidden'); return; }
      infoCard.classList.remove('hidden');
      if (target.kind === 'body') {
        const d = target.data;
        infoTitle.textContent = d.name;
        infoType.textContent = d.type;
        const extra = d.name === 'Moon' ? `<div class="metric"><div>Phase</div><div>${moonPhaseName(d.phase)} (${d.phase.toFixed(1)}%)</div></div>` : '';
        const elong = d.elongation != null ? `<div class="metric"><div>Elongation</div><div>${d.elongation.toFixed(1)}°</div></div>` : '';
        infoBody.innerHTML = `
          <div class="metric"><div>Altitude</div><div>${formatSigned(d.alt,1)}°</div></div>
          <div class="metric"><div>Azimuth</div><div>${d.az.toFixed(1)}°</div></div>
          <div class="metric"><div>RA / Dec</div><div>${d.ra.toFixed(2)}h / ${formatSigned(d.dec,1)}°</div></div>
          <div class="metric"><div>Distance</div><div>${formatDistance(d.distanceAu)}</div></div>
          ${extra}
          ${elong}
        `;
      } else {
        infoTitle.textContent = target.name;
        infoType.textContent = 'Star';
        infoBody.innerHTML = `
          <div class="metric"><div>Magnitude</div><div>${target.mag.toFixed(2)}</div></div>
          <div class="metric"><div>Distance</div><div>${formatDistance(null, target.dist)}</div></div>
          <div class="metric"><div>Spectral</div><div>${target.spec}</div></div>
          <div class="metric"><div>Altitude</div><div>${formatSigned(target.current.altDeg,1)}°</div></div>
          <div class="metric"><div>Azimuth</div><div>${target.current.azDeg.toFixed(1)}°</div></div>
          <div class="metric"><div>RA / Dec</div><div>${target.current.ra.toFixed(2)}h / ${formatSigned(target.current.dec,1)}°</div></div>
        `;
      }
    }

    function updateOrientation() {
      const pitch = clamp((state.gyro ? state.gyroPitch : state.dragPitch), -85, 85) * DEG;
      const yaw = (state.gyro ? state.gyroYaw : state.dragYaw) * DEG;
      camera.rotation.order = 'YXZ';
      camera.rotation.set(-pitch, yaw, 0);
    }

    function tick(deltaMs) {
      if (state.isPlaying) state.simTime = new Date(state.simTime.getTime() + deltaMs * state.speed);
      updateOrientation();
      updateStars();
      updateBodies();
      refreshPaths();
      pathGroup.children.forEach(line => { line.visible = state.showPaths; });
      updateHUD();
      updateLabels();
      if (state.selected) renderInfo(state.selected);
      renderer.render(scene, camera);
    }

    let lastFrame = performance.now();
    function animate(now) {
      requestAnimationFrame(animate);
      const delta = Math.min(100, now - lastFrame);
      lastFrame = now;
      tick(delta);
    }

    function setObserver(lat, lon, source='manual') {
      observer.latitude = clamp(Number(lat), -90, 90);
      observer.longitude = clamp(Number(lon), -180, 180);
      latInput.value = observer.latitude.toFixed(4);
      lonInput.value = observer.longitude.toFixed(4);
      state.lastPathKey = '';
      locationStatus.textContent = source === 'geo' ? 'Auto geolocation' : 'Manual override';
      observerText.textContent = `${observer.latitude.toFixed(3)}°, ${observer.longitude.toFixed(3)}°`;
    }

    function requestGeo() {
      if (!navigator.geolocation) { showMessage('Geolocation unavailable'); return; }
      navigator.geolocation.getCurrentPosition(pos => {
        setObserver(pos.coords.latitude, pos.coords.longitude, 'geo');
        showMessage('Location updated');
      }, () => {
        setObserver(-6.1754, 106.8272, 'fallback');
        showMessage('Using Jakarta fallback');
      }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 });
    }

    async function enableGyro() {
      if (!window.DeviceOrientationEvent) { showMessage('Gyroscope unsupported'); return; }
      try {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission !== 'granted') throw new Error('denied');
        }
        state.gyro = true;
        showMessage('Gyroscope enabled');
      } catch {
        state.gyro = false;
        showMessage('Gyroscope permission denied');
      }
    }

    window.addEventListener('deviceorientation', evt => {
      if (!state.gyro) return;
      if (evt.alpha == null) return;
      state.gyroYaw = -evt.alpha;
      state.gyroPitch = (evt.beta || 0) - 45;
      state.gyroRoll = evt.gamma || 0;
    });

    function pickObject(clientX, clientY) {
      pointer.x = (clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const targets = [...bodyMeshes.values(), ...STARS.map(s => s.mesh)];
      const hits = raycaster.intersectObjects(targets, true);
      const hit = hits.find(h => h.object.userData.kind || h.object.parent?.userData.kind);
      if (!hit) return null;
      const obj = hit.object.userData.kind ? hit.object : hit.object.parent;
      if (obj.userData.kind === 'body') return { kind:'body', data: obj.userData.data };
      if (obj.userData.kind === 'star') return { kind:'star', ...obj.userData.data };
      return null;
    }

    function onPointerDown(x, y) {
      state.dragging = true;
      state.lastPointer = { x, y, moved: false };
    }
    function onPointerMove(x, y) {
      if (!state.dragging || state.gyro) return;
      const dx = x - state.lastPointer.x;
      const dy = y - state.lastPointer.y;
      if (Math.abs(dx) + Math.abs(dy) > 2) state.lastPointer.moved = true;
      state.dragYaw -= dx * 0.15;
      state.dragPitch = clamp(state.dragPitch - dy * 0.15, -85, 85);
      state.lastPointer.x = x;
      state.lastPointer.y = y;
    }
    function onPointerUp(x, y) {
      if (!state.dragging) return;
      const moved = state.lastPointer?.moved;
      state.dragging = false;
      if (!moved) {
        state.selected = pickObject(x, y);
        renderInfo(state.selected);
      }
      state.lastPointer = null;
    }

    app.addEventListener('pointerdown', e => onPointerDown(e.clientX, e.clientY));
    window.addEventListener('pointermove', e => onPointerMove(e.clientX, e.clientY));
    window.addEventListener('pointerup', e => onPointerUp(e.clientX, e.clientY));
    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      updateLabels();
    });

    document.getElementById('locationForm').addEventListener('submit', e => {
      e.preventDefault();
      const lat = parseFloat(latInput.value);
      const lon = parseFloat(lonInput.value);
      if (Number.isFinite(lat) && Number.isFinite(lon)) {
        setObserver(lat, lon, 'manual');
        showMessage('Manual location applied');
      }
    });

    playBtn.addEventListener('click', () => { state.isPlaying = !state.isPlaying; });
    nowBtn.addEventListener('click', () => { state.simTime = new Date(); state.lastPathKey = ''; showMessage('Jumped to now'); });
    gyroBtn.addEventListener('click', () => { if (state.gyro) { state.gyro = false; showMessage('Gyroscope disabled'); } else enableGyro(); });
    pathsBtn.addEventListener('click', () => { state.showPaths = !state.showPaths; });
    speedRange.addEventListener('input', e => { state.speed = parseInt(e.target.value, 10); });
    backwardBtn.addEventListener('click', () => { state.speed = -Math.max(30, Math.abs(state.speed)); speedRange.value = state.speed; });
    forwardBtn.addEventListener('click', () => { state.speed = Math.max(30, Math.abs(state.speed)); speedRange.value = state.speed; });
    canvas.addEventListener('dblclick', () => { state.selected = null; renderInfo(null); });

    setObserver(-6.1754, 106.8272, 'fallback');
    requestGeo();
    animate(performance.now());
  </script>
</body>
</html>
