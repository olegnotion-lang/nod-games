<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Flappy Bird</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#4dc9f6;font-family:system-ui,sans-serif}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H,dpr;
function resize(){dpr=Math.min(window.devicePixelRatio||1,2);W=window.innerWidth;H=window.innerHeight;c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}
resize();window.onresize=resize;

const GRAVITY=0.45,FLAP=-7.5,PIPE_W=60,GAP=160,PIPE_SPEED=2.5,BIRD_SIZE=22;
let bird,pipes,score,best=0,state='idle',frame=0;

function reset(){bird={x:W*0.25,y:H*0.45,vy:0,rot:0};pipes=[];score=0;frame=0}
reset();

function addPipe(){
  const minY=GAP/2+40,maxY=H-GAP/2-40;
  const cy=minY+Math.random()*(maxY-minY);
  pipes.push({x:W+PIPE_W,cy})
}

function flap(){
  if(state==='dead')return;
  if(state==='idle'){state='play';bird.vy=FLAP;addPipe();return}
  bird.vy=FLAP
}

c.addEventListener('pointerdown',e=>{e.preventDefault();if(state==='dead'){reset();state='idle'}else flap()});
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();if(state==='dead'){reset();state='idle'}else flap()}});

function update(){
  if(state!=='play')return;
  frame++;
  bird.vy+=GRAVITY;
  bird.y+=bird.vy;
  bird.rot=Math.min(bird.vy*3,90);

  if(frame%90===0)addPipe();

  for(let p of pipes){
    p.x-=PIPE_SPEED;
    if(!p.scored&&p.x+PIPE_W<bird.x){p.scored=true;score++;if(score>best)best=score}
  }
  pipes=pipes.filter(p=>p.x>-PIPE_W-10);

  // collision
  const bx=bird.x,by=bird.y,r=BIRD_SIZE*0.45;
  if(by-r<0||by+r>H){state='dead';return}
  for(let p of pipes){
    if(bx+r>p.x&&bx-r<p.x+PIPE_W){
      if(by-r<p.cy-GAP/2||by+r>p.cy+GAP/2){state='dead';return}
    }
  }
}

function drawBg(){
  const grd=ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#4dc9f6');grd.addColorStop(0.7,'#87CEEB');grd.addColorStop(1,'#2d8a4e');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  // ground
  ctx.fillStyle='#5a3';ctx.fillRect(0,H-30,W,30);
  ctx.fillStyle='#4a2';ctx.fillRect(0,H-30,W,4);
}

function drawPipes(){
  for(let p of pipes){
    const topH=p.cy-GAP/2,botY=p.cy+GAP/2;
    // top pipe
    ctx.fillStyle='#3a3';ctx.fillRect(p.x,0,PIPE_W,topH);
    ctx.fillStyle='#2a2';ctx.fillRect(p.x-4,topH-26,PIPE_W+8,26);
    ctx.fillStyle='#4b4';ctx.fillRect(p.x+4,0,6,topH-26);
    // bottom pipe
    ctx.fillStyle='#3a3';ctx.fillRect(p.x,botY,PIPE_W,H-botY);
    ctx.fillStyle='#2a2';ctx.fillRect(p.x-4,botY,PIPE_W+8,26);
    ctx.fillStyle='#4b4';ctx.fillRect(p.x+4,botY+26,6,H-botY-26);
  }
}

function drawBird(){
  ctx.save();
  ctx.translate(bird.x,bird.y);
  ctx.rotate(bird.rot*Math.PI/180);
  // body
  ctx.fillStyle='#f5c842';
  ctx.beginPath();ctx.ellipse(0,0,BIRD_SIZE,BIRD_SIZE*0.8,0,0,Math.PI*2);ctx.fill();
  // wing
  ctx.fillStyle='#e6a800';
  ctx.beginPath();ctx.ellipse(-4,2,BIRD_SIZE*0.55,BIRD_SIZE*0.35,-.2,0,Math.PI*2);ctx.fill();
  // eye
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(BIRD_SIZE*0.35,-BIRD_SIZE*0.2,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(BIRD_SIZE*0.4,-BIRD_SIZE*0.2,3,0,Math.PI*2);ctx.fill();
  // beak
  ctx.fillStyle='#e8431f';
  ctx.beginPath();ctx.moveTo(BIRD_SIZE*0.6,-3);ctx.lineTo(BIRD_SIZE+6,2);ctx.lineTo(BIRD_SIZE*0.6,6);ctx.closePath();ctx.fill();
  ctx.restore();
}

function drawScore(){
  ctx.fillStyle='#fff';ctx.strokeStyle='#000';ctx.lineWidth=3;
  ctx.font='bold 48px system-ui';ctx.textAlign='center';
  ctx.strokeText(score,W/2,70);ctx.fillText(score,W/2,70);
}

function drawUI(){
  if(state==='idle'){
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font='bold 36px system-ui';ctx.textAlign='center';
    ctx.fillText('Tap to Play',W/2,H/2-20);
    ctx.font='18px system-ui';ctx.fillText('Best: '+best,W/2,H/2+20);
  }
  if(state==='dead'){
    ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff4444';ctx.font='bold 40px system-ui';ctx.textAlign='center';
    ctx.fillText('Game Over',W/2,H/2-40);
    ctx.fillStyle='#fff';ctx.font='bold 28px system-ui';
    ctx.fillText('Score: '+score,W/2,H/2+10);
    ctx.font='18px system-ui';ctx.fillText('Best: '+best,W/2,H/2+45);
    ctx.font='16px system-ui';ctx.fillStyle='#ccc';ctx.fillText('Tap to restart',W/2,H/2+80);
  }
}

function draw(){
  drawBg();drawPipes();drawBird();drawScore();drawUI()
}

function loop(){requestAnimationFrame(loop);update();draw()}
loop();
</script>
</body>
</html>
