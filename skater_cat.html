// ── Game state ─────────────────────────────────────────────────
let state='menu';
let score=0, bestScore=parseInt(localStorage.getItem('skaterCatBest')||'0');
let speed=6, baseSpeed=6, maxSpeed=20;
let playerX=0.5, playerTargetX=0.5;
let tilt=0, touchStartX=null, touchDragX=null;
let gameTime=0, totalDist=0;
let shakeTimer=0;
let obstacles=[], collectibles=[], particles=[];
let bgScrollX=0;

// Perspective constants
const HORIZON=0.32, ROAD_W=0.55;
const VANISH_Y=()=>H*HORIZON;
const ROAD_BOTTOM=()=>H*0.95;

// Road texture scroll state
let roadScrollY=0;

function initWorld(){ bgScrollX=0; roadScrollY=0; }

function resetGame(){
  score=0;speed=baseSpeed;playerX=0.5;playerTargetX=0.5;
  gameTime=0;totalDist=0;shakeTimer=0;
  obstacles=[];collectibles=[];particles=[];
  initWorld();
  spawnInitial();
}

function spawnInitial(){
  for(let i=0;i<3;i++) spawnObstacle(0.3+Math.random()*0.4);
}

const OBS_TYPES=['car','trash','pedestrian','bench','flowerpot'];
const COL_TYPES=['fish','yarn','treat'];

function spawnObstacle(startZ){
  let z=startZ||0;
  let lane=0.15+Math.random()*0.7;
  let type=OBS_TYPES[Math.floor(Math.random()*OBS_TYPES.length)];
  obstacles.push({x:lane,z:z,type:type,hit:false});
}

function spawnCollectible(startZ){
  let z=startZ||0;
  let lane=0.15+Math.random()*0.7;
  let type=COL_TYPES[Math.floor(Math.random()*COL_TYPES.length)];
  collectibles.push({x:lane,z:z,type:type,collected:false,bobPhase:Math.random()*Math.PI*2});
}

function project(xNorm,z){
  let vy=VANISH_Y(), by=ROAD_BOTTOM();
  let y=vy+(by-vy)*z;
  let roadHalfW=(ROAD_W/2)*z*W;
  let cx=W/2;
  let winding=Math.sin(totalDist*0.01+z*2)*z*30;
  let x=cx+winding+(xNorm-0.5)*roadHalfW*2;
  let scale=z;
  return {x,y,scale};
}

// ── Background (parallax) ──────────────────────────────────────
function drawBackground(){
  if(!imgBg.complete||!imgBg.naturalWidth){
    // Fallback gradient
    let g=X.createLinearGradient(0,0,0,H*0.65);
    g.addColorStop(0,'#5B86E5'); g.addColorStop(0.5,'#FFD89B'); g.addColorStop(1,'#FF7F50');
    X.fillStyle=g; X.fillRect(0,0,W,H*0.65);
    return;
  }
  // Tile the panoramic background horizontally across the upper ~65% of screen
  let bh=H*0.65;
  let srcW=imgBg.naturalWidth, srcH=imgBg.naturalHeight;
  // Scale to fit height
  let scale=bh/srcH;
  let dw=srcW*scale; // drawn width of one copy
  // Parallax: scroll slower than road
  let off=(bgScrollX%(dw))+dw;
  off=off%dw;
  // Draw enough copies to fill width
  let startX=-(off);
  for(let x=startX;x<W+dw;x+=dw){
    X.drawImage(imgBg,x,0,dw,bh);
  }
  // Blend bottom edge into road area
  let fade=X.createLinearGradient(0,bh*0.8,0,bh);
  fade.addColorStop(0,'rgba(0,0,0,0)');
  fade.addColorStop(1,'rgba(20,15,10,0.5)');
  X.fillStyle=fade;
  X.fillRect(0,bh*0.8,W,bh*0.2);
}

// ── Road with texture ──────────────────────────────────────────
function drawRoad(){
  let vy=VANISH_Y(), by=ROAD_BOTTOM();
  let cx=W/2;
  let rdW=imgRoad.naturalWidth||512, rdH=imgRoad.naturalHeight||512;

  if(!imgRoad.complete||!imgRoad.naturalWidth){
    // Fallback plain road
    for(let y=Math.floor(vy);y<by;y++){
      let t=(y-vy)/(by-vy);
      let halfW=(ROAD_W/2)*t*W;
      let winding=Math.sin(totalDist*0.01+t*2)*t*30;
      let roadCx=cx+winding;
      let r=Math.floor(120+t*20),g=Math.floor(110+t*15),b=Math.floor(90+t*10);
      X.fillStyle=`rgb(${r},${g},${b})`;
      X.fillRect(roadCx-halfW,y,halfW*2,1.5);
      X.fillStyle=`rgba(245,222,179,${0.6+t*0.4})`;
      X.fillRect(roadCx-halfW-halfW*0.15,y,halfW*0.15,1.5);
      X.fillRect(roadCx+halfW,y,halfW*0.15,1.5);
    }
    return;
  }

  // Use clipping to draw road in perspective shape
  X.save();
  // Build road trapezoid path
  let topHalfW=(ROAD_W/2)*0.01*W;
  let botHalfW=(ROAD_W/2)*1*W;
  let topW0=Math.sin(totalDist*0.01+0.01*2)*0.01*30;
  let botW0=Math.sin(totalDist*0.01+1*2)*1*30;
  X.beginPath();
  X.moveTo(cx+topW0-topHalfW,vy);
  X.lineTo(cx+topW0+topHalfW,vy);
  X.lineTo(cx+botW0+botHalfW,by);
  X.lineTo(cx+botW0-botHalfW,by);
  X.closePath();
  X.clip();

  // Draw road texture slices for perspective
  let slices=120;
  for(let i=0;i<slices;i++){
    let t0=i/slices, t1=(i+1)/slices;
    let y0=vy+(by-vy)*t0;
    let y1=vy+(by-vy)*t1;
    let halfW0=(ROAD_W/2)*t0*W;
    let halfW1=(ROAD_W/2)*t1*W;
    let wind0=Math.sin(totalDist*0.01+t0*2)*t0*30;
    let wind1=Math.sin(totalDist*0.01+t1*2)*t1*30;
    let roadX0=cx+wind0-halfW0;
    let roadW0=halfW0*2;
    let roadX1=cx+wind1-halfW1;
    let roadW1=halfW1*2;

    // Perspective UV: v scrolls with totalDist
    let perspective=t0<0.001?0.001:t0;
    let vOffset=(roadScrollY/rdH)%1;
    let srcV=(vOffset+(1/perspective)*0.02)%1;
    let srcY=srcV*rdH;
    let srcH_slice=rdH*0.015/perspective;

    X.save();
    // Draw a thin horizontal strip as quad using transform trick
    let midX=(roadX0+roadX1)*0.5;
    let midW=(roadW0+roadW1)*0.5;
    let sliceH=y1-y0;
    X.drawImage(imgRoad, 0, srcY, rdW, Math.min(srcH_slice,rdH-srcY-0.1)||1,
                roadX0, y0, roadW0, sliceH);
    X.restore();
  }

  // Sidewalks
  let sideColor='rgba(210,195,165,0.7)';
  for(let i=0;i<60;i++){
    let t=i/60;
    let y0=vy+(by-vy)*t;
    let y1=vy+(by-vy)*((i+1)/60);
    let halfW=(ROAD_W/2)*t*W;
    let wind=Math.sin(totalDist*0.01+t*2)*t*30;
    let roadCx=cx+wind;
    X.fillStyle=sideColor;
    X.fillRect(roadCx-halfW-halfW*0.15,y0,halfW*0.15,y1-y0+1);
    X.fillRect(roadCx+halfW,y0,halfW*0.15,y1-y0+1);
  }

  X.restore();

  // Center dashes
  for(let z=0.05;z<1;z+=0.025){
    let p=project(0.5,z);
    if(((z*500+totalDist)%35)<20){
      let dh=Math.max(1,(1-z)*4);
      X.fillStyle=`rgba(255,240,220,${0.3+z*0.5})`;
      X.fillRect(p.x-1,p.y,2,dh);
    }
  }
}

// ── Cat sprite ────────────────────────────────────────────────
function drawCatSprite(x,y,scale){
  let s=scale*0.8;
  X.save();
  X.translate(x,y);

  // Shadow
  X.fillStyle='rgba(0,0,0,0.2)';
  X.beginPath();X.ellipse(0,10*s,20*s,5*s,0,0,Math.PI*2);X.fill();

  // Skateboard
  let sbW=30*s,sbH=5*s;
  X.fillStyle='#8B4513';
  roundRect(-sbW/2,2*s,sbW,sbH,3*s);
  X.fillStyle='#333';
  drawEllipse(0,-3*s+9*s,3*s,3*s,'#444');
  drawEllipse(-sbW/2+5*s,8*s,3*s,3*s,'#444');
  drawEllipse(sbW/2-5*s,8*s,3*s,3*s,'#444');

  if(imgCat.complete&&imgCat.naturalWidth){
    // Crop a single pose from the sprite sheet — use top-left quadrant
    let cw=imgCat.naturalWidth, ch=imgCat.naturalHeight;
    // The sprite sheet is 2x2 poses; pick pose based on gameTime
    let col=Math.floor(gameTime*3)%2;
    let row=0;
    let poseW=cw/2, poseH=ch/2;
    let sx=col*poseW, sy=row*poseH;
    let drawH=55*s, drawW=drawH*(poseW/poseH);
    X.drawImage(imgCat, sx,sy, poseW,poseH, -drawW/2,-drawH-2*s, drawW,drawH);
  } else {
    // Fallback primitive cat
    X.fillStyle='#FFDAB9';
    X.beginPath();X.ellipse(0,-20*s,12*s,18*s,0,0,Math.PI*2);X.fill();
    X.beginPath();X.ellipse(0,-32*s,10*s,9*s,0,0,Math.PI*2);X.fill();
  }

  X.restore();
}

function drawEllipse(cx,cy,rx,ry,col){
  X.beginPath();X.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);X.fillStyle=col;X.fill();
}

function roundRect(x,y,w,h,r){
  X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);
  X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  X.lineTo(x+r,y+h);X.quadraticCurveTo(x,y+h,x,y+h-r);
  X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);X.fill();
}

// ── Obstacle drawing ──────────────────────────────────────────
const COL_BLDG=['#FF8A80','#81D4FA','#A5D6A7','#FFE082','#CE93D8'];

function shadeColor(col,pct){
  let num=parseInt(col.replace('#',''),16);
  let r=Math.min(255,Math.max(0,((num>>16)&0xFF)+pct));
  let g=Math.min(255,Math.max(0,((num>>8)&0xFF)+pct));
  let b=Math.min(255,Math.max(0,(num&0xFF)+pct));
  return `rgb(${r},${g},${b})`;
}

function drawObstacle(obs){
  let p=project(obs.x,obs.z);
  let s=p.scale;
  if(s<0.05||p.y<VANISH_Y())return;

  // Try to use items sprite sheet for obstacles
  if(imgItems.complete&&imgItems.naturalWidth){
    let iw=imgItems.naturalWidth, ih=imgItems.naturalHeight;
    // Map obstacle types to regions of sprite sheet (3x2 grid assumed)
    let typeMap={car:0,trash:1,pedestrian:2,bench:3,flowerpot:4};
    let idx=typeMap[obs.type]||0;
    let cols=3,rows=2;
    let cx2=idx%cols, cy2=Math.floor(idx/cols);
    let sw=iw/cols, sh2=ih/rows;
    let drawH=40*s, drawW=drawH*(sw/sh2);
    X.save();X.translate(p.x,p.y);X.globalAlpha=Math.min(1,s*3);
    X.drawImage(imgItems, cx2*sw,cy2*sh2, sw,sh2, -drawW/2,-drawH, drawW,drawH);
    X.restore();
    return;
  }

  // Fallback primitives
  X.save();X.translate(p.x,p.y);X.globalAlpha=Math.min(1,s*3);
  switch(obs.type){
    case 'car':{
      let carCol=COL_BLDG[Math.abs(Math.floor(obs.x*10))%5];
      X.fillStyle=carCol; roundRect(-20*s,-18*s,40*s,14*s,3*s);
      X.fillStyle=shadeColor(carCol,-15); roundRect(-14*s,-28*s,28*s,12*s,3*s);
      X.fillStyle='rgba(135,206,235,0.7)';
      X.fillRect(-11*s,-26*s,10*s,8*s); X.fillRect(2*s,-26*s,10*s,8*s);
      drawEllipse(-14*s,-3*s,5*s,4*s,'#444'); drawEllipse(14*s,-3*s,5*s,4*s,'#444');
      break;}
    case 'trash':
      X.fillStyle='#78909C'; roundRect(-6*s,-20*s,12*s,18*s,2*s);
      drawEllipse(0,-22*s,8*s,2*s,'#607D8B'); break;
    case 'pedestrian':
      drawEllipse(0,-22*s,6*s,6*s,'#FFDAB9');
      X.fillStyle='#E1BEE7'; X.fillRect(-7*s,-16*s,14*s,16*s);
      X.fillStyle='#5D4037'; X.fillRect(-6*s,-2*s,4*s,8*s); X.fillRect(2*s,-2*s,4*s,8*s);
      break;
    case 'bench':
      X.fillStyle='#8D6E63';
      X.fillRect(-15*s,-8*s,30*s,3*s); X.fillRect(-15*s,-14*s,2*s,10*s);
      X.fillRect(13*s,-14*s,2*s,10*s); X.fillRect(-15*s,-14*s,30*s,3*s);
      X.fillRect(-13*s,-5*s,2*s,8*s); X.fillRect(11*s,-5*s,2*s,8*s); break;
    case 'flowerpot':
      X.fillStyle='#D4A574';
      X.beginPath();X.moveTo(-6*s,-2*s);X.lineTo(-8*s,-14*s);X.lineTo(8*s,-14*s);X.lineTo(6*s,-2*s);X.fill();
      let fCols=['#FF7F7F','#FFB6C1','#DDA0DD','#FFD700'];
      for(let f=0;f<3;f++){
        drawEllipse(-4*s+f*4*s,-18*s-f*2*s,3*s,3*s,fCols[f%4]);
        drawEllipse(-4*s+f*4*s,-18*s-f*2*s,1.5*s,1.5*s,'#FFE082');
      }
      break;
  }
  X.restore();
}

// ── Collectible drawing ───────────────────────────────────────
function drawCollectible(col){
  let p=project(col.x,col.z);
  let s=p.scale;
  if(s<0.05||p.y<VANISH_Y())return;
  let bob=Math.sin(gameTime*4+col.bobPhase)*4*s;
  X.save();X.translate(p.x,p.y+bob);X.globalAlpha=Math.min(1,s*3);

  // Glow
  let glow=X.createRadialGradient(0,-8*s,0,0,-8*s,15*s);
  glow.addColorStop(0,'rgba(255,255,200,0.4)');glow.addColorStop(1,'rgba(255,255,200,0)');
  X.fillStyle=glow;X.fillRect(-15*s,-23*s,30*s,30*s);

  if(imgItems.complete&&imgItems.naturalWidth){
    let iw=imgItems.naturalWidth, ih=imgItems.naturalHeight;
    let typeMap2={fish:3,yarn:4,treat:5};
    let idx2=typeMap2[col.type]||3;
    let cols=3,rows=2;
    let cx3=idx2%cols, cy3=Math.floor(idx2/cols);
    let sw=iw/cols, sh3=ih/rows;
    let drawH=25*s, drawW=drawH*(sw/sh3);
    X.drawImage(imgItems, cx3*sw,cy3*sh3, sw,sh3, -drawW/2,-drawH, drawW,drawH);
    X.restore();
    return;
  }

  switch(col.type){
    case 'fish':
      X.fillStyle='#FF8A65';
      X.beginPath();X.ellipse(0,-10*s,8*s,5*s,0,0,Math.PI*2);X.fill();
      X.beginPath();X.moveTo(8*s,-10*s);X.lineTo(14*s,-6*s);X.lineTo(14*s,-14*s);X.fill();
      drawEllipse(-3*s,-11*s,1.5*s,1.5*s,'white');
      drawEllipse(-3*s,-11*s,0.8*s,0.8*s,'#333');
      X.fillStyle='rgba(255,255,255,0.8)';
      X.fillRect(-1*s,-18*s,2*s,4*s);X.fillRect(-3*s,-16*s,6*s,1.5*s);
      break;
    case 'yarn':
      X.fillStyle='#E1BEE7';
      X.beginPath();X.ellipse(0,-10*s,7*s,7*s,0,0,Math.PI*2);X.fill();
      X.strokeStyle='#CE93D8';X.lineWidth=1*s;
      X.beginPath();X.arc(0,-10*s,4*s,0,Math.PI*1.5);X.stroke();
      break;
    case 'treat':
      X.fillStyle='#FFD54F';
      X.beginPath();
      for(let i=0;i<5;i++){
        let a=(i/5)*Math.PI*2-Math.PI/2;
        let ox=Math.cos(a)*7*s,oy=Math.sin(a)*7*s-10*s;
        let ix=Math.cos(a+Math.PI/5)*3*s,iy=Math.sin(a+Math.PI/5)*3*s-10*s;
        i===0?X.moveTo(ox,oy):X.lineTo(ox,oy);
        X.lineTo(ix,iy);
      }
      X.fill();
      break;
  }
  X.restore();
}

// ── Particles ─────────────────────────────────────────────────
function spawnParticle(x,y,type){
  for(let i=0;i<6;i++){
    particles.push({
      x,y,vx:(Math.random()-0.5)*4,vy:-Math.random()*3-1,
      life:1,decay:0.02+Math.random()*0.02,
      size:3+Math.random()*4,
      col:type==='collect'?['#FFD700','#FF69B4','#87CEEB'][i%3]:'#FF6B6B'
    });
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(){
  for(let p of particles){
    X.globalAlpha=p.life;X.fillStyle=p.col;
    X.beginPath();X.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;
}

// ── Warm overlay ──────────────────────────────────────────────
function drawWarmOverlay(){
  let g=X.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'rgba(255,180,100,0.06)');
  g.addColorStop(0.5,'rgba(255,160,80,0.04)');
  g.addColorStop(1,'rgba(255,140,60,0.08)');
  X.fillStyle=g;X.fillRect(0,0,W,H);
  X.save();X.globalAlpha=0.05+Math.sin(gameTime)*0.015;
  let flareG=X.createRadialGradient(W*0.75,H*0.15,0,W*0.75,H*0.15,H*0.8);
  flareG.addColorStop(0,'rgba(255,220,150,0.5)');flareG.addColorStop(1,'transparent');
  X.fillStyle=flareG;X.fillRect(0,0,W,H);
  X.restore();
}

// ── HUD ───────────────────────────────────────────────────────
function outlineText(txt,x,y,size,fill,stroke,align='center'){
  X.font=`bold ${size}px sans-serif`;
  X.textAlign=align;X.textBaseline='middle';
  X.strokeStyle=stroke;X.lineWidth=Math.max(3,size/8);
  X.lineJoin='round';X.strokeText(txt,x,y);
  X.fillStyle=fill;X.fillText(txt,x,y);
}

function roundRectPath(x,y,w,h,r){
  X.beginPath();
  if(w<0)w=0;
  r=Math.min(r,w/2,h/2);
  X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);
  X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  X.lineTo(x+r,y+h);X.quadraticCurveTo(x,y+h,x,y+h-r);
  X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);
}

function drawHUD(){
  outlineText(`🐟 ${score}`,W/2,35,28,'#FFF8E7','rgba(0,0,0,0.5)');
  let spdPct=(speed-baseSpeed)/(maxSpeed-baseSpeed);
  X.fillStyle='rgba(0,0,0,0.2)';
  roundRectPath(10,10,60,8,4);X.fill();
  X.fillStyle=`hsl(${(1-spdPct)*60},80%,60%)`;
  roundRectPath(10,10,60*spdPct,8,4);X.fill();
}

// ── Menu ──────────────────────────────────────────────────────
function drawMenu(){
  drawBackground();
  drawRoad();
  drawWarmOverlay();
  X.fillStyle='rgba(0,0,0,0.35)';
  roundRectPath(W*0.1,H*0.22,W*0.8,H*0.5,20);X.fill();
  X.fillStyle='rgba(255,248,231,0.08)';
  roundRectPath(W*0.1+3,H*0.22+3,W*0.8-6,H*0.5-6,18);X.fill();
  outlineText('🛹',W/2,H*0.29,48,'#FFF','transparent');
  outlineText('Skater Kitten',W/2,H*0.37,Math.min(36,W*0.09),'#FFF8E7','rgba(0,0,0,0.5)');
  outlineText('lofi boulevard edition',W/2,H*0.43,Math.min(16,W*0.04),'#FFD89B','rgba(0,0,0,0.4)');
  let kp=project(0.5,0.9);
  drawCatSprite(W/2,H*0.56,1.2);
  outlineText('Tap to Start',W/2,H*0.72,Math.min(22,W*0.055),'#FFF','rgba(0,0,0,0.4)');
  if(bestScore>0) outlineText(`Best: ${bestScore}`,W/2,H*0.78,Math.min(16,W*0.04),'#FFD700','rgba(0,0,0,0.4)');
  outlineText('swipe or tilt to steer',W/2,H*0.86,Math.min(13,W*0.033),'rgba(255,255,255,0.6)','transparent');
}

// ── Game Over ─────────────────────────────────────────────────
function drawGameOver(){
  X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(0,0,W,H);
  X.fillStyle='rgba(30,20,40,0.85)';
  roundRectPath(W*0.1,H*0.25,W*0.8,H*0.5,20);X.fill();
  outlineText('Game Over!',W/2,H*0.33,Math.min(32,W*0.08),'#FF8A80','rgba(0,0,0,0.5)');
  outlineText(`Score: ${score}`,W/2,H*0.43,Math.min(28,W*0.07),'#FFF8E7','rgba(0,0,0,0.4)');
  if(score>=bestScore){
    outlineText('★ New Best! ★',W/2,H*0.50,Math.min(20,W*0.05),'#FFD700','rgba(0,0,0,0.4)');
  } else {
    outlineText(`Best: ${bestScore}`,W/2,H*0.50,Math.min(18,W*0.045),'#FFD89B','rgba(0,0,0,0.4)');
  }
  X.fillStyle='#FF7F7F';
  roundRectPath(W*0.25,H*0.58,W*0.5,H*0.08,12);X.fill();
  X.fillStyle='#FF6B6B';
  roundRectPath(W*0.25+2,H*0.58+2,W*0.5-4,H*0.08-4,10);X.fill();
  outlineText('Play Again',W/2,H*0.62,Math.min(20,W*0.05),'#FFF','rgba(0,0,0,0.3)');
  outlineText(`Distance: ${Math.floor(totalDist)}m`,W/2,H*0.70,Math.min(14,W*0.035),'rgba(255,255,255,0.6)','transparent');
}

// ── Update ────────────────────────────────────────────────────
function update(dt){
  if(state!=='play')return;
  gameTime+=dt;
  totalDist+=speed*dt*10;
  speed=Math.min(maxSpeed,baseSpeed+gameTime*0.15);

  // Scroll bg and road
  bgScrollX+=speed*dt*3;
  roadScrollY+=speed*dt*8;

  playerX+=(playerTargetX-playerX)*0.12;
  playerX=Math.max(0.1,Math.min(0.9,playerX));
  if(Math.abs(tilt)>2){
    playerTargetX+=tilt*0.001;
    playerTargetX=Math.max(0.1,Math.min(0.9,playerTargetX));
  }

  for(let i=obstacles.length-1;i>=0;i--){
    let o=obstacles[i];
    o.z+=speed*dt*0.015;
    if(o.z>1.15){obstacles.splice(i,1);continue;}
    if(!o.hit&&o.z>0.82&&o.z<0.98){
      let dx=Math.abs(o.x-playerX);
      if(dx<0.1){o.hit=true;gameOver();return;}
    }
  }

  for(let i=collectibles.length-1;i>=0;i--){
    let c=collectibles[i];
    c.z+=speed*dt*0.015;
    if(c.z>1.15){collectibles.splice(i,1);continue;}
    if(!c.collected&&c.z>0.8&&c.z<1.0){
      let dx=Math.abs(c.x-playerX);
      if(dx<0.12){
        c.collected=true;
        score+=c.type==='fish'?10:c.type==='yarn'?5:15;
        let pp=project(c.x,c.z);
        spawnParticle(pp.x,pp.y,'collect');
        collectibles.splice(i,1);
      }
    }
  }

  if(Math.random()<speed*dt*0.4) spawnObstacle(0);
  if(Math.random()<speed*dt*0.25) spawnCollectible(0);

  if(shakeTimer>0) shakeTimer-=dt;
  updateParticles(dt);
}

function gameOver(){
  state='over';
  shakeTimer=0.3;
  if(score>bestScore){bestScore=score;localStorage.setItem('skaterCatBest',bestScore);}
  let pp=project(playerX,0.9);
  for(let i=0;i<12;i++){
    particles.push({x:pp.x,y:pp.y,vx:(Math.random()-0.5)*6,vy:-Math.random()*5-2,
      life:1,decay:0.015,size:4+Math.random()*4,col:['#FF6B6B','#FFD700','#FFF'][i%3]});
  }
}

// ── Draw frame ────────────────────────────────────────────────
function draw(){
  X.clearRect(0,0,W,H);
  let shakeX=0,shakeY=0;
  if(shakeTimer>0){shakeX=(Math.random()-0.5)*10;shakeY=(Math.random()-0.5)*10;}
  X.save();X.translate(shakeX,shakeY);

  if(state==='menu'){
    drawMenu();
  } else {
    drawBackground();
    drawRoad();
    let items=[...obstacles.map(o=>({...o,cat:'obs'})),...collectibles.map(c=>({...c,cat:'col'}))];
    items.sort((a,b)=>a.z-b.z);
    for(let item of items){
      if(item.cat==='obs')drawObstacle(item);
      else drawCollectible(item);
    }
    let kp=project(playerX,0.9);
    drawCatSprite(kp.x,kp.y-15,kp.scale*1.1);
    drawWarmOverlay();
    drawParticles();
    drawHUD();
    if(state==='over')drawGameOver();
  }
  X.restore();
}

// ── Input ────────────────────────────────────────────────────
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  let t=e.touches[0];
  touchStartX=t.clientX;touchDragX=t.clientX;
  if(state==='menu'){state='play';resetGame();return;}
  if(state==='over'){
    let ty=t.clientY;
    if(ty>H*0.58&&ty<H*0.66&&t.clientX>W*0.25&&t.clientX<W*0.75){state='play';resetGame();}
    return;
  }
},{passive:false});

C.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(state!=='play')return;
  let t=e.touches[0];
  let dx=t.clientX-touchDragX;
  playerTargetX+=dx/W*1.5;
  playerTargetX=Math.max(0.1,Math.min(0.9,playerTargetX));
  touchDragX=t.clientX;
},{passive:false});

C.addEventListener('touchend',e=>{touchStartX=null;touchDragX=null;},{passive:false});

C.addEventListener('mousedown',e=>{
  touchStartX=e.clientX;touchDragX=e.clientX;
  if(state==='menu'){state='play';resetGame();return;}
  if(state==='over'){
    if(e.clientY>H*0.58&&e.clientY<H*0.66&&e.clientX>W*0.25&&e.clientX<W*0.75){state='play';resetGame();}
  }
});
C.addEventListener('mousemove',e=>{
  if(touchDragX===null||state!=='play')return;
  let dx=e.clientX-touchDragX;
  playerTargetX+=dx/W*1.5;
  playerTargetX=Math.max(0.1,Math.min(0.9,playerTargetX));
  touchDragX=e.clientX;
});
C.addEventListener('mouseup',()=>{touchStartX=null;touchDragX=null;});

if(window.DeviceOrientationEvent){
  if(typeof DeviceOrientationEvent.requestPermission==='function'){
    C.addEventListener('touchend',function reqPerm(){
      DeviceOrientationEvent.requestPermission().then(r=>{
        if(r==='granted')window.addEventListener('deviceorientation',onTilt);
      }).catch(()=>{});
      C.removeEventListener('touchend',reqPerm);
    },{once:true});
  } else {
    window.addEventListener('deviceorientation',onTilt);
  }
}
function onTilt(e){ if(e.gamma!==null)tilt=e.gamma; }

document.addEventListener('keydown',e=>{
  if(state==='menu'){state='play';resetGame();return;}
  if(state==='over'&&(e.key==='Enter'||e.key===' ')){state='play';resetGame();return;}
  if(e.key==='ArrowLeft')playerTargetX-=0.05;
  if(e.key==='ArrowRight')playerTargetX+=0.05;
  playerTargetX=Math.max(0.1,Math.min(0.9,playerTargetX));
});

// ── Game loop ─────────────────────────────────────────────────
let lastTime=0;
initWorld();
function loop(ts){
  let dt=Math.min(0.05,(ts-lastTime)/1000);
  lastTime=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
