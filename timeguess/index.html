<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TimeGuess</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #0d0d1a; font-family: Arial, sans-serif; color: #fff; }

.game { max-width: 420px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

/* Header */
.header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #1a1a2a; }
.h-round { font-size: 13px; color: #888; }
.h-dots { display: flex; gap: 5px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #222; border: 1px solid #333; }
.dot.done { background: #FFD700; border-color: #FFD700; }
.dot.active { background: transparent; border: 2px solid #FFD700; }
.h-score { font-size: 13px; color: #888; }
.h-score b { color: #FFD700; }

/* Scene */
.scene { position: relative; width: 100%; height: 260px; overflow: hidden; flex-shrink: 0; }
.scene-img { width: 100%; height: 100%; object-fit: cover; }
.scene-fake { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(160deg, #2a1505 0%, #0a0a20 40%, #051a0a 70%, #1a0505 100%); }
.scene-fake img { width: 100%; height: 100%; object-fit: cover; }
.scene-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(13,13,26,0.95) 100%); }
.scene-caption { position: absolute; bottom: 12px; left: 16px; right: 16px; }
.scene-tag { display: inline-block; background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.3); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: #FFD700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.scene-question { font-size: 17px; font-weight: bold; color: #fff; line-height: 1.3; text-shadow: 0 1px 6px rgba(0,0,0,0.8); }

/* Answers */
.answers { padding: 16px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
.answer { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 14px 16px; cursor: pointer; transition: all 0.15s; }
.answer:active { transform: scale(0.98); }
.a-letter { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: #888; flex-shrink: 0; }
.a-text { font-size: 14px; color: #ccc; line-height: 1.3; }

/* States */
.answer.selected { background: rgba(255,215,0,0.1); border-color: #FFD700; }
.answer.selected .a-letter { background: #FFD700; color: #000; }
.answer.selected .a-text { color: #fff; }
.answer.correct { background: rgba(76,175,80,0.12); border-color: #4CAF50; }
.answer.correct .a-letter { background: #4CAF50; color: #fff; }
.answer.correct .a-text { color: #4CAF50; font-weight: bold; }
.answer.wrong { opacity: 0.4; }
.answer.wrong .a-letter { background: rgba(255,82,82,0.3); color: #FF5252; }

.submit-area { padding: 0 16px 32px; }
.btn-submit { width: 100%; background: linear-gradient(135deg, #FFD700, #FF8C00); color: #000; border: none; border-radius: 14px; padding: 16px; font-size: 17px; font-weight: bold; cursor: pointer; }
.btn-submit:disabled { background: #1a1a2a; color: #333; cursor: default; }
</style>
</head>
<body>
<div class="game">

  <div class="header">
    <div class="h-round">Раунд 1 / 5</div>
    <div class="h-dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="h-score">Очки: <b>0</b></div>
  </div>

  <div class="scene">
    <div class="scene-fake">
      <!-- Здесь будет AI-картинка. Сейчас: плейсхолдер -->
      <svg width="100%" height="100%" viewBox="0 0 420 260" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="sky" cx="50%" cy="30%">
            <stop offset="0%" stop-color="#1a2a4a"/>
            <stop offset="100%" stop-color="#0a0a15"/>
          </radialGradient>
        </defs>
        <rect width="420" height="260" fill="url(#sky)"/>
        <!-- Ground -->
        <rect y="190" width="420" height="70" fill="#1a1005"/>
        <rect y="185" width="420" height="10" fill="#2a1a08"/>
        <!-- Colosseum rough shape -->
        <ellipse cx="210" cy="185" rx="130" ry="50" fill="none" stroke="#8b6914" stroke-width="2"/>
        <rect x="80" y="100" width="260" height="90" rx="4" fill="#6b4f0f" opacity="0.8"/>
        <rect x="90" y="110" width="240" height="70" fill="#7a5c10" opacity="0.6"/>
        <!-- Arches -->
        <rect x="100" y="120" width="20" height="40" rx="10" fill="#3a2505"/>
        <rect x="130" y="120" width="20" height="40" rx="10" fill="#3a2505"/>
        <rect x="160" y="120" width="20" height="40" rx="10" fill="#3a2505"/>
        <rect x="190" y="120" width="20" height="40" rx="10" fill="#3a2505"/>
        <rect x="220" y="120" width="20" height="40" rx="10" fill="#3a2505"/>
        <rect x="250" y="120" width="20" height="40" rx="10" fill="#3a2505"/>
        <rect x="280" y="120" width="20" height="40" rx="10" fill="#3a2505"/>
        <!-- Figures -->
        <circle cx="170" cy="182" r="5" fill="#c8a060"/>
        <rect x="167" y="187" width="6" height="12" fill="#8b3a3a"/>
        <circle cx="240" cy="180" r="5" fill="#c8a060"/>
        <rect x="237" y="185" width="6" height="14" fill="#3a5a8b"/>
        <!-- Moon -->
        <circle cx="340" cy="50" r="18" fill="#ffd080" opacity="0.7"/>
        <!-- Stars -->
        <circle cx="60" cy="40" r="1.5" fill="#fff" opacity="0.8"/>
        <circle cx="120" cy="25" r="1" fill="#fff" opacity="0.6"/>
        <circle cx="290" cy="30" r="1.5" fill="#fff" opacity="0.7"/>
        <circle cx="380" cy="55" r="1" fill="#fff" opacity="0.5"/>
      </svg>
    </div>
    <div class="scene-overlay"></div>
    <div class="scene-caption">
      <div class="scene-tag">📍 Неизвестное место</div>
      <div class="scene-question">В каком году произошло это событие?</div>
    </div>
  </div>

  <div class="answers" id="answers">
    <div class="answer" onclick="pick(this, false)">
      <div class="a-letter">A</div>
      <div class="a-text">753 до н.э. — основание Рима</div>
    </div>
    <div class="answer" onclick="pick(this, false)">
      <div class="a-letter">B</div>
      <div class="a-text">44 до н.э. — убийство Цезаря</div>
    </div>
    <div class="answer" onclick="pick(this, true)">
      <div class="a-letter">C</div>
      <div class="a-text">80 н.э. — открытие Колизея</div>
    </div>
    <div class="answer" onclick="pick(this, false)">
      <div class="a-letter">D</div>
      <div class="a-text">476 н.э. — падение Рима</div>
    </div>
  </div>

  <div class="submit-area">
    <button class="btn-submit" id="submitBtn" disabled>Выбери ответ</button>
  </div>

</div>

<script>
let selected = null;
let answered = false;

function pick(el, isCorrect) {
  if (answered) return;
  selected = el;
  document.querySelectorAll('.answer').forEach(a => a.classList.remove('selected'));
  el.classList.add('selected');
  el._correct = isCorrect;
  const btn = document.getElementById('submitBtn');
  btn.disabled = false;
  btn.textContent = 'Подтвердить ответ →';
}

document.getElementById('submitBtn').addEventListener('click', function() {
  if (!selected || answered) return;
  answered = true;
  this.disabled = true;

  document.querySelectorAll('.answer').forEach(a => {
    if (a._correct) {
      a.classList.remove('selected');
      a.classList.add('correct');
    } else if (a === selected && !a._correct) {
      a.classList.add('wrong');
    }
  });

  if (selected._correct) {
    this.style.background = '#4CAF50';
    this.style.color = '#fff';
    this.textContent = '✓ Правильно! +500 очков';
  } else {
    this.style.background = '#FF5252';
    this.style.color = '#fff';
    this.textContent = '✗ Неверно — правильный ответ выделен';
  }

  setTimeout(() => {
    this.style.background = '';
    this.style.color = '';
    this.textContent = 'Следующий раунд →';
    this.disabled = false;
  }, 1500);
});
</script>
</body>
</html>
